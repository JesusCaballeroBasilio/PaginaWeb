<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Blog del Compi</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">Blog del Compi</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5 pt-5">
  <div class="row">

    <div class="col-md-2"></div>

    <div class="col-md-8">

      <h1 class="text-warning text-center">Contacto</h1>

      <form id="contactForm" class="mt-4">

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Mensaje</label>
          <textarea class="form-control" rows="4" required></textarea>
        </div>

        <button type="submit" class="btn btn-warning">Enviar</button>

      </form>

      <!-- ALERTA -->
      <div id="alerta" class="alert alert-success alert-dismissible fade show mt-3 d-none">
        Message sent
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

    </div>

    <div class="col-md-2"></div>

  </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  <p>Creado por Jesus Caballero</p>
  <p>Email: contacto@compiblog.com</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();
  document.getElementById("alerta").classList.remove("d-none");
});
</script>

</body>
</html>
